[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  ".local",
  "archive",
  "sandbox",
  "venv",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "F401", "B"]

[tool.coverage.run]
source = ["agent", "skills", "tools", "web", "config", "sandbox"]
branch = true
omit = [
  "sandbox/*",
]

[tool.coverage.report]
skip_covered = true
show_missing = true
