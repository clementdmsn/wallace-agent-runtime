<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Wallace runtime architecture</title>
  <desc id="desc">Browser frontend connects to Flask, the agent loop, skill routing, policy enforcement, tools, sandbox, model server, evals, and traces.</desc>
  <rect width="960" height="420" fill="#1e1f1c"/>
  <style>
    text { font: 600 16px system-ui, sans-serif; fill: #f8f8f2; }
    .muted { fill: #cfcfc2; font-size: 13px; font-weight: 500; }
    .box { fill: #2f302a; stroke: #75715e; stroke-width: 2; rx: 8; }
    .accent { fill: #273323; stroke: #a6e22e; }
    .policy { fill: #332632; stroke: #f92672; }
    .arrow { stroke: #66d9ef; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#66d9ef"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="70" width="150" height="78"/>
  <text x="68" y="104">Browser UI</text>
  <text class="muted" x="68" y="128">chat + timeline</text>
  <rect class="box" x="250" y="70" width="150" height="78"/>
  <text x="286" y="104">Flask App</text>
  <text class="muted" x="276" y="128">state + routes</text>
  <rect class="accent" x="460" y="55" width="170" height="108"/>
  <text x="500" y="96">Agent Loop</text>
  <text class="muted" x="488" y="122">streaming tools</text>
  <rect class="box" x="700" y="55" width="190" height="108"/>
  <text x="746" y="96">Model Server</text>
  <text class="muted" x="728" y="122">OpenAI-compatible</text>
  <rect class="box" x="250" y="240" width="150" height="80"/>
  <text x="290" y="274">Skills</text>
  <text class="muted" x="277" y="298">routing + guidance</text>
  <rect class="policy" x="460" y="235" width="170" height="90"/>
  <text x="498" y="272">Policy</text>
  <text class="muted" x="488" y="298">external checks</text>
  <rect class="box" x="700" y="225" width="190" height="110"/>
  <text x="770" y="260">Tools</text>
  <text class="muted" x="730" y="286">files, code, curl</text>
  <text class="muted" x="742" y="309">OWASP retrieval</text>
  <rect class="box" x="700" y="355" width="190" height="42"/>
  <text class="muted" x="732" y="382">Sandbox + traces + evals</text>
  <path class="arrow" d="M190 109 H250"/>
  <path class="arrow" d="M400 109 H460"/>
  <path class="arrow" d="M630 109 H700"/>
  <path class="arrow" d="M545 163 V235"/>
  <path class="arrow" d="M400 280 H460"/>
  <path class="arrow" d="M630 280 H700"/>
  <path class="arrow" d="M795 335 V355"/>
  <path class="arrow" d="M325 240 V148 H460"/>
</svg>
