<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Wallace observability UI demo</title>
  <desc id="desc">Screenshot-style rendering of the Wallace UI showing chat, selected OWASP skill, metrics, policy, and tool timeline.</desc>
  <rect width="960" height="540" fill="#1e1f1c"/>
  <style>
    text { font-family: system-ui, sans-serif; fill: #f8f8f2; }
    .muted { fill: #cfcfc2; font-size: 13px; }
    .small { font-size: 12px; fill: #cfcfc2; }
    .label { font-size: 10px; font-weight: 800; fill: #75715e; letter-spacing: .08em; }
    .panel { fill: #2f302a; stroke: #75715e; stroke-width: 1.5; rx: 8; }
    .chat { fill: #272822; stroke: #49483e; rx: 8; }
    .accent { fill: #273323; stroke: #a6e22e; rx: 8; }
    .policy { fill: #332632; stroke: #f92672; rx: 8; }
    .tool { fill: #362f22; stroke: #fd971f; rx: 8; }
  </style>
  <rect class="panel" x="22" y="22" width="190" height="496"/>
  <text x="48" y="58" font-size="22" font-weight="800">Wallace</text>
  <rect class="accent" x="42" y="86" width="138" height="40"/>
  <text x="72" y="111" font-size="14" font-weight="700" fill="#1e1f1c">New Chat</text>
  <rect class="chat" x="238" y="22" width="430" height="496"/>
  <text x="264" y="58" font-size="22" font-weight="800">OWASP audit</text>
  <rect class="chat" x="264" y="90" width="350" height="70"/>
  <text class="label" x="286" y="118">USER</text>
  <text class="small" x="286" y="142">security audit app.py using OWASP</text>
  <rect class="chat" x="294" y="182" width="332" height="146"/>
  <text class="label" x="316" y="210">WALLACE</text>
  <text class="small" x="316" y="236">Findings first, ordered by severity.</text>
  <text class="small" x="316" y="262">Each finding cites returned OWASP</text>
  <text class="small" x="316" y="288">reference metadata and review limits.</text>
  <rect class="panel" x="692" y="22" width="246" height="496"/>
  <text x="718" y="58" font-size="22" font-weight="800">Runtime</text>
  <rect class="accent" x="718" y="82" width="194" height="56"/>
  <text class="label" x="736" y="106">SELECTED SKILL</text>
  <text x="736" y="126" font-size="14" font-weight="800">owasp_security_review</text>
  <rect class="policy" x="718" y="154" width="194" height="58"/>
  <text class="label" x="736" y="178">POLICY</text>
  <text class="small" x="736" y="198">reference required before final</text>
  <rect class="panel" x="718" y="228" width="194" height="82"/>
  <text class="label" x="736" y="252">METRICS</text>
  <text class="small" x="736" y="274">Request 2.41s</text>
  <text class="small" x="736" y="294">Tool calls 3</text>
  <rect class="tool" x="718" y="330" width="194" height="44"/>
  <text class="small" x="736" y="357">1 discover_review_targets</text>
  <rect class="tool" x="718" y="384" width="194" height="44"/>
  <text class="small" x="736" y="411">2 read_file_with_line_numbers</text>
  <rect class="tool" x="718" y="438" width="194" height="44"/>
  <text class="small" x="736" y="465">3 search_owasp_reference</text>
</svg>
